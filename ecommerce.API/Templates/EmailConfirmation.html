<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your email</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #F9FAFB;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 480px;
      margin: 40px auto;
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 8px;
      padding: 40px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      color: #0E7C7B;
      margin-bottom: 24px;
    }

    h2 {
      color: #1F2937;
      margin-bottom: 8px;
    }

    p {
      color: #4B5563;
      line-height: 1.6;
    }

    .otp {
      font-size: 36px;
      font-weight: bold;
      letter-spacing: 10px;
      color: #0E7C7B;
      text-align: center;
      margin: 32px 0;
    }

    .note {
      font-size: 13px;
      color: #9CA3AF;
      margin-top: 24px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">TechShop</div>
    <h2>Hi {{UserName}},</h2>
    <p>Thank you for registering. Use the OTP below to confirm your email address. It expires in <strong>10
        minutes</strong>.</p>
    <div class="otp">{{OTP}}</div>
    <p>If you did not create an account, you can safely ignore this email.</p>
    <p class="note">© 2026 TechShop. All rights reserved.</p>
  </div>
</body>

</html>
