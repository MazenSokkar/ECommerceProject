<div>
  @if (label()) {
    <label
      [for]="inputId"
      class="block text-sm font-medium text-neutral-700 dark:text-neutral-100 mb-1.5"
    >
      {{ label() }}
      @if (required()) {
        <span class="text-danger">*</span>
      }
    </label>
  }

  <div [class]="prefix() ? 'flex' : ''">
    @if (prefix()) {
      <span class="inline-flex items-center px-3 text-sm border border-e-0 border-neutral-200 dark:border-neutral-600 bg-neutral-50 dark:bg-neutral-700 rounded-s-xl text-neutral-600 dark:text-neutral-300 select-none">
        {{ prefix() }}
      </span>
    }
    <input
      [id]="inputId"
      [type]="type()"
      [placeholder]="placeholder()"
      [autocomplete]="autocomplete()"
      [attr.inputmode]="inputmode() || null"
      [formControl]="control()"
      class="form-input"
      [class.form-input--error]="hasError()"
      [class.!rounded-s-none]="!!prefix()"
      [class.flex-1]="!!prefix()"
    />
  </div>

  @if (hint() && !hasError()) {
    <p class="text-neutral-400 dark:text-neutral-500 text-xs mt-1">{{ hint() }}</p>
  }

  @if (hasError()) {
    <p class="text-danger text-xs mt-1">{{ errorText() }}</p>
  }
</div>
