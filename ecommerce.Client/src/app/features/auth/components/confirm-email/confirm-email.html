<app-card>
  <app-icon-header icon="lni lni-envelope" class="mb-5" />

  <div class="text-center mb-7">
    <h2 class="text-2xl font-extrabold text-neutral-800 dark:text-slate-100">Check your email</h2>
    <p class="text-neutral-500 dark:text-slate-400 text-sm mt-2">
      We sent a 6-digit code to
      @if (email()) {
        <span class="font-semibold text-neutral-700 dark:text-slate-200">{{ email() }}</span>
      } @else {
        your email address
      }
    </p>
  </div>

  <div class="mb-6">
    <app-otp-input [hasError]="hasError()" (valueChange)="onOtpChange($event)" />
    @if (hasError()) {
      <p class="text-center text-danger text-sm mt-3">Invalid or expired code. Try again.</p>
    }
  </div>

  <app-button
    type="button"
    variant="primary"
    [fullWidth]="true"
    [loading]="loading()"
    [disabled]="!otpReady()"
    loadingText="Verifying…"
    (click)="onSubmit()"
  >
    Confirm Email
  </app-button>

  <div class="mt-5 text-center">
    <app-resend-code [loading]="resendLoading()" (resend)="onResend()" />
  </div>

  <p class="mt-4 text-center text-sm text-neutral-400 dark:text-slate-500">
    <a routerLink="/login" class="hover:text-primary transition-colors">← Back to Login</a>
  </p>
</app-card>
