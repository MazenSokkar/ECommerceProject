<div class="min-h-screen flex">
  <!-- Left brand panel (teal gradient — looks fine in both modes) -->
  <div
    class="hidden lg:flex lg:w-1/2 flex-col items-center justify-center p-12 text-white relative overflow-hidden"
    style="background: linear-gradient(135deg, #0E7C7B 0%, #065f5e 50%, #044443 100%)"
  >
    <div class="absolute top-[-80px] left-[-80px] w-64 h-64 rounded-full opacity-10 bg-white"></div>
    <div class="absolute bottom-[-60px] right-[-60px] w-80 h-80 rounded-full opacity-10 bg-white"></div>
    <div class="absolute top-1/3 right-[-40px] w-40 h-40 rounded-full opacity-5 bg-white"></div>

    <div class="relative z-10 max-w-xs text-center">
      <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-white/20 backdrop-blur mb-6 shadow-xl">
        <i class="lni lni-gift text-white text-4xl"></i>
      </div>
      <h1 class="text-4xl font-extrabold tracking-tight mb-2">GiftWave</h1>
      <p class="text-teal-200 text-lg font-medium mb-8">Send a real gift in seconds</p>
      <div class="space-y-4 text-left">
        @for (feature of features; track feature.title) {
          <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-xl bg-white/15 flex items-center justify-center shrink-0">
              <span [innerHTML]="feature.icon" class="text-white"></span>
            </div>
            <div>
              <p class="font-semibold text-sm">{{ feature.title }}</p>
              <p class="text-teal-300 text-xs">{{ feature.subtitle }}</p>
            </div>
          </div>
        }
      </div>
    </div>
  </div>

  <!-- Right form panel -->
  <div class="flex-1 flex flex-col bg-neutral-50 dark:bg-slate-900 overflow-y-auto">
    <!-- Top bar: mobile logo (left) + theme toggle (right) -->
    <div class="flex items-center justify-between px-6 py-4 lg:justify-end">
      <div class="flex items-center gap-2 lg:hidden">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: #0E7C7B">
          <i class="lni lni-gift text-white text-sm"></i>
        </div>
        <span class="font-extrabold text-neutral-800 dark:text-slate-100 text-lg">GiftWave</span>
      </div>
      <app-theme-toggle />
    </div>

    <!-- Form centered in remaining space -->
    <div class="flex-1 flex items-center justify-center p-6">
      <div class="w-full">
        <router-outlet />
      </div>
    </div>
  </div>
</div>
