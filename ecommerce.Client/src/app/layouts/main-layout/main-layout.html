<div class="min-h-screen bg-neutral-50 flex flex-col">
  <!-- Header -->
  <header class="bg-white border-b border-neutral-200 px-4 sm:px-6 h-16 flex items-center justify-between sticky top-0 z-30 shadow-sm">
    
    <!-- Left: Logo & Nav -->
    <div class="flex items-center gap-8">
      <!-- Logo -->
      <a routerLink="/app" class="flex items-center gap-2 no-underline shrink-0">
        <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background: #0E7C7B">
          <i class="lni lni-gift text-white text-sm"></i>
        </div>
        <span class="font-extrabold text-neutral-800 text-lg hidden sm:block">TechShop</span>
      </a>

      <!-- Nav Links -->
      <nav class="hidden lg:flex items-center gap-6">
        <a routerLink="/app" routerLinkActive="text-primary" [routerLinkActiveOptions]="{exact: true}"
          class="text-sm font-medium text-neutral-600 hover:text-primary transition-colors">
          Home
        </a>
        <a routerLink="/app/products" routerLinkActive="text-primary"
          class="text-sm font-medium text-neutral-600 hover:text-primary transition-colors">
          Products
        </a>

        @if (isMerchant()) {
        <a routerLink="/app/merchant" routerLinkActive="text-primary"
          class="text-sm font-medium text-neutral-600 hover:text-primary transition-colors">
          Merchant
        </a>
        }
      </nav>
    </div>

    <!-- Right: Actions & Profile -->
    <div class="flex items-center gap-3 sm:gap-5">

      <!-- Wishlist & Cart Icons -->
      <div class="flex items-center gap-2">
        <a routerLink="/app/wishlist" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-50 hover:bg-neutral-100 text-neutral-600 hover:text-primary transition-colors" title="Wishlist">
          <i class="lni lni-heart text-xl mt-0.5"></i>
        </a>
        
        <a routerLink="/app/cart" class="w-10 h-10 rounded-full flex items-center justify-center bg-neutral-50 hover:bg-neutral-100 text-neutral-600 hover:text-primary transition-colors relative" title="Cart">
          <i class="lni lni-cart text-xl mt-0.5"></i>
          @if (cartCount() > 0) {
          <span class="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-primary text-white text-[10px] font-bold flex items-center justify-center shadow-sm border-2 border-white">
            {{ cartCount() > 99 ? '99+' : cartCount() }}
          </span>
          }
        </a>
      </div>

      <div class="h-6 w-px bg-neutral-200 hidden sm:block"></div>
      
      <div class="hidden sm:block">
        <app-theme-toggle />
      </div>

      <div class="h-6 w-px bg-neutral-200 hidden sm:block"></div>

      <div class="relative">
        <button (click)="toggleUserMenu()"
          class="flex items-center gap-2 rounded-xl px-3 py-2 hover:bg-neutral-100 transition-colors">
          <div class="avatar-circle w-8 h-8 text-sm">{{ initials() }}</div>
          <span class="hidden sm:block text-sm font-medium text-neutral-700">{{ displayName() }}</span>
          <i class="lni lni-chevron-down text-neutral-400 text-sm"></i>
        </button>

        @if (userMenuOpen()) {
        <div
          class="absolute right-0 top-full mt-1 w-48 bg-white rounded-xl shadow-lg border border-neutral-100 py-1 z-50">
          <div class="px-3 py-2 border-b border-neutral-100 mb-1">
            <p class="text-xs font-semibold text-neutral-800 truncate">{{ displayName() }}</p>
            <p class="text-xs text-neutral-400 truncate">{{ profile()?.email }}</p>
          </div>
          
          <a routerLink="/app/profile" class="w-full text-left px-3 py-2 text-sm text-neutral-700 hover:bg-neutral-50 transition-colors flex items-center gap-2">
            <i class="lni lni-user text-sm"></i> Profile
          </a>

          @if (isAdmin()) {
          <a routerLink="/app/admin" class="w-full text-left px-3 py-2 text-sm text-neutral-700 hover:bg-neutral-50 transition-colors flex items-center gap-2">
            <i class="lni lni-dashboard text-sm"></i> Admin Dashboard
          </a>
          }

          @if (isCustomer()) {
          <a routerLink="/app/orders" class="w-full text-left px-3 py-2 text-sm text-neutral-700 hover:bg-neutral-50 transition-colors flex items-center gap-2">
            <i class="lni lni-package text-sm"></i> My Orders
          </a>
          <a routerLink="/app/payment" class="w-full text-left px-3 py-2 text-sm text-neutral-700 hover:bg-neutral-50 transition-colors flex items-center gap-2">
            <i class="lni lni-credit-cards text-sm"></i> Payment
          </a>
          }

          <div class="h-px bg-neutral-100 my-1"></div>

          <button (click)="onLogout()" [disabled]="loggingOut()"
            class="w-full text-left px-3 py-2 text-sm text-danger hover:bg-red-50 transition-colors flex items-center gap-2 disabled:opacity-50">
            <i class="lni lni-exit text-sm"></i>
            {{ loggingOut() ? 'Logging out…' : 'Logout' }}
          </button>
        </div>
        }
      </div>


    </div>
  </header>

  <!-- Page content -->
  <main class="flex-1 p-4 sm:p-6">
    <router-outlet />
  </main>
</div>
